name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill discovery
        run: |
          npx --yes skills add . --list
          npx --yes skills add ./skills/tutti-workspace-app-factory --list

      - name: Validate plugin manifests
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          marketplace = pathlib.Path(".agents/plugins/marketplace.json")
          data = json.loads(marketplace.read_text())
          plugins = data.get("plugins")
          if not isinstance(plugins, list) or not plugins:
              sys.exit("marketplace must contain at least one plugin entry")
          entry = plugins[0]
          if entry.get("name") != "tutti":
              sys.exit("marketplace plugin name must be tutti")
          if entry.get("source", {}).get("path") != "./plugins/tutti":
              sys.exit("marketplace plugin source path must be ./plugins/tutti")

          claude_marketplace = pathlib.Path(".claude-plugin/marketplace.json")
          claude_data = json.loads(claude_marketplace.read_text())
          if claude_data.get("name") != "tutti-agent-skills":
              sys.exit("Claude marketplace name must be tutti-agent-skills")
          claude_plugins = claude_data.get("plugins")
          if not isinstance(claude_plugins, list) or not claude_plugins:
              sys.exit("Claude marketplace must contain at least one plugin entry")
          claude_entry = claude_plugins[0]
          if claude_entry.get("name") != "tutti":
              sys.exit("Claude marketplace plugin name must be tutti")
          if claude_entry.get("source") != "./plugins/tutti":
              sys.exit("Claude marketplace plugin source must be ./plugins/tutti")

          claude_manifest = pathlib.Path("plugins/tutti/.claude-plugin/plugin.json")
          claude_plugin = json.loads(claude_manifest.read_text())
          if claude_plugin.get("name") != "tutti":
              sys.exit("Claude plugin name must be tutti")
          if claude_plugin.get("skills") != "./skills/":
              sys.exit("Claude plugin skills path must be ./skills/")
          if claude_plugin.get("hooks") != "./hooks/hooks.json":
              sys.exit("Claude plugin hooks path must be ./hooks/hooks.json")
          if claude_plugin.get("homepage") != "https://tutti.sh/":
              sys.exit("Claude plugin homepage must be https://tutti.sh/")
          if not pathlib.Path("plugins/tutti/skills/tutti-workspace-app-factory/SKILL.md").exists():
              sys.exit("Claude plugin bundled skill is missing")
          hooks = pathlib.Path("plugins/tutti/hooks/hooks.json")
          hooks_data = json.loads(hooks.read_text())
          if "SessionStart" not in hooks_data.get("hooks", {}):
              sys.exit("Claude plugin must declare a SessionStart hook")
          update_script = pathlib.Path("plugins/tutti/scripts/auto-update-claude-plugin.sh")
          if not update_script.exists():
              sys.exit("Claude plugin auto-update script is missing")

          for plugin_root in [pathlib.Path("."), pathlib.Path("plugins/tutti")]:
              manifest = plugin_root / ".codex-plugin/plugin.json"
              plugin = json.loads(manifest.read_text())
              if plugin.get("name") != "tutti":
                  sys.exit(f"{manifest} plugin name must be tutti")
              if plugin.get("skills") != "./skills/":
                  sys.exit(f"{manifest} skills path must be ./skills/")
              if plugin.get("interface", {}).get("websiteURL") != "https://tutti.sh/":
                  sys.exit(f"{manifest} websiteURL must be https://tutti.sh/")
              for asset_key in ("composerIcon", "logo"):
                  asset_path = plugin.get("interface", {}).get(asset_key)
                  if asset_path != "./assets/icon.png":
                      sys.exit(f"{manifest} {asset_key} must be ./assets/icon.png")
                  if not (plugin_root / "assets/icon.png").exists():
                      sys.exit(f"{plugin_root / 'assets/icon.png'} is missing")
              skill = plugin_root / "skills/tutti-workspace-app-factory/SKILL.md"
              if not skill.exists():
                  sys.exit(f"{skill} is missing")
          PY

      - name: Validate skill metadata
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          skill = pathlib.Path("skills/tutti-workspace-app-factory/SKILL.md")
          text = skill.read_text()
          if not text.startswith("---\n"):
              sys.exit("SKILL.md must start with YAML frontmatter")
          end = text.find("\n---\n", 4)
          if end < 0:
              sys.exit("SKILL.md must close YAML frontmatter")
          frontmatter = text[4:end]
          if not re.search(r"^name:\s*tutti-workspace-app-factory\s*$", frontmatter, re.M):
              sys.exit("SKILL.md missing expected name")
          if not re.search(r"^description:\s*.+", frontmatter, re.M):
              sys.exit("SKILL.md missing description")
          allowed = {"name", "description"}
          keys = {
              line.split(":", 1)[0].strip()
              for line in frontmatter.splitlines()
              if ":" in line and not line.startswith(" ")
          }
          extra = keys - allowed
          if extra:
              sys.exit(f"SKILL.md frontmatter has unsupported keys: {sorted(extra)}")
          PY
